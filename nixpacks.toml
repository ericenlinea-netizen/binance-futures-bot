[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -e ."
]

[phases.build]
cmds = ["echo 'Python service build complete'"]

[start]
cmd = ". /opt/venv/bin/activate && python main.py run --env-file .env"
